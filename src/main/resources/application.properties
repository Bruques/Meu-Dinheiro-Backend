spring.application.name=meudinheiro

# Configuração do Banco de Dados H2 (Memória)
spring.datasource.url=jdbc:h2:mem:expensedb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Permite que o Hibernate crie as tabelas automaticamente
spring.jpa.hibernate.ddl-auto=update

# Habilita o console do H2 no navegador (http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

gemini.api.key=${GEMINI_API_KEY}
logging.level.web=TRACE

spring.security.oauth2.resourceserver.jwt.issuer-uri=https://securetoken.google.com/meu-dinheiro-app-b75e2